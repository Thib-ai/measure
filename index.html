<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📐 Measure Image Tool</title>
    <script src="https://cdn.jsdelivr.net/npm/vue@2.6.14/dist/vue.js"></script>
    <style>
        * {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            padding: 0;
            overflow: hidden; /* Prevent scrolling */
            width: 100%;
            height: 100%;
        }

        body {
            background-color: #222;
            color: #fff;
            font-family: sans-serif;
        }

        #app {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        #toolbar {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            background-color: #333;
            padding: 10px;
            color: white;
            z-index: 10;
        }

        #toolbar input, #toolbar button {
            margin: 0 3px;
        }

        #toolbar span {
            margin-left: 2em;
        }

        canvas {
            cursor: grab;
            flex-grow: 1;
        }

        .line-length, .handle, .reference-length, .delete-line {
            position: absolute;
        }

        .line-length {
            background: rgba(0, 0, 0, 0.5);
            color: white;
            padding: 2px 5px;
            border-radius: 3px;
            font-size: 12px;
            font-family: monospace;
            transform: translate(-50%, -50%);
            text-shadow:
                -1px -1px 0 #000,
                 1px -1px 0 #000,
                -1px  1px 0 #000,
                 1px  1px 0 #000,
                -1px  0px 0 #000,
                 1px  0px 0 #000,
                 0px -1px 0 #000,
                 0px  1px 0 #000;
        }
        .handle {
            width: 14px;
            height: 14px;
            border-radius: 14px;
            transform: translate(-50%, -50%);
            cursor: move;
            opacity: 0.1;
            background-color: cyan;
        }

        .reference-handle {
            background-color: red;
        }

        .handle:hover {
            opacity: 0.5;
            transform: translate(-50%, -50%) scale(1.1);
        }

        .handle:active {
            opacity: 1;
            cursor: none;
            border-radius: 100%;
            border: 1px dotted cyan;
            background-color: transparent !important;
            transform: translate(-50%, -50%) scale(2);
        }

        .delete-line {
            cursor: pointer;
            color: red;
            font-weight: bold;
            transform: translate(50%, -50%);
        }

        .reference-length {
            transform: translate(-50%, -50%);
            opacity: 0.3;
            display: flex;
        }

        .reference-length:hover, .reference-length:focus {
            opacity: 1;
        }

        .reference-length input {
            width: 55px;
        }

        .reference-length select {
            max-width: 40px;
        }

        #controls {
            position: fixed;
            top: 50px;
            right: 10px;
            z-index: 10;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px;
            border-radius: 5px;
            display: flex;
            flex-direction: column;
            gap: 5px;
            align-items: center;
        }

        #controls button {
            width: 45px;
            height: 30px;
            font-size: 12px;
            cursor: pointer;
        }

        #zoom-level {
            font-size: 14px;
            color: white;
            margin-top: 5px;
        }
    </style>
</head>

<body>
    <div id="app">
        <div id="toolbar">
            <span><b>📐 Measure App</b></span>
            <span>
                Image
                <input type="file" @change="handleImage" accept="image/*">
            </span>
            <span>
                Measure
                <button @click="startDrawing('measurement')">📏 Add Line</button>
                <select v-model="areaType" style="margin:0 3px">
                    <option value="rect">▭ Rectangle</option>
                    <option value="polygon">⬠ Polygon</option>
                </select>
                <button @click="startDrawing('area')">+ Add Area</button>
                <button v-if="areas.some(a => a.type === 'polygon' && !a.closed)" @click="finishPolygon">✓ Finish</button>
                <button @click="removeAll()">❌ Clear All</button>
            </span>
            <span>
                DPI: <input type="number" v-model.number="dpi" @input="updateScaleFromDPI" :disabled="referenceLine" min="0" step="1" size="4">
                or
                <button @click="startDrawing('reference')" :disabled="referenceLine && referenceLine.end">📏 Draw Reference Line</button>
                <button @click="removeReferenceLine" :disabled="!referenceLine">❌ Remove Reference Line</button>
            </span>
        </div>

        <!-- Zoom and Pan Controls -->
        <div id="controls">
            <button @click="zoomIn">+</button>
            <span id="zoom-level">{{ (zoomLevel * 100).toFixed(0) }}%</span>
            <button @click="zoomOut">-</button>

            <button @click="resetZoom">100%</button>
            <button @click="fitToWindow">Fit</button>
        </div>

        <!-- Lines -->
        <div v-for="(line, index) in lines" :key="index">
            <div v-if="line.end" class="line-length" :style="getLineStyle(line)">
                {{ getLineLength(line) }}
                <span class="delete-line" @click="deleteLine(index)">✖</span>
            </div>
            <div v-for="(handle, handleIndex) in line.handles" :key="handleIndex" class="handle" :style="getHandleStyle(handle)"
                @mousedown="startDragging($event, line, handleIndex + 1)">
            </div>
        </div>

        <!-- Areas -->
        <div v-for="(area, index) in areas" :key="'area-' + index">
            <div v-if="area.end || area.closed || (area.type === 'polygon' && area.points.length >= 3)" class="line-length" :style="getAreaCenterStyle(area)">
                {{ getAreaLabel(area) }}
                <span class="delete-line" @click="deleteArea(index)">✖</span>
            </div>
            <div v-for="(handle, handleIndex) in area.handles" :key="'ah-' + index + '-' + handleIndex" class="handle" :style="getHandleStyle(handle)"
                @mousedown="startDragging($event, area, handleIndex + 1)">
            </div>
        </div>

        <!-- Reference Line -->
        <div v-if="referenceLine && referenceLine.end">
            <div class="reference-length" :style="getLineStyle(referenceLine)">
                <input type="number" v-model.number="referenceLength" @input="updateMeasurementLabels" size="4" min="0" step="0.1">
                <select v-model="unit">
                    <option value="">none</option>
                    <option value="mm">mm</option>
                    <option value="cm">cm</option>
                    <option value="m">m</option>
                    <option value="in">in</option>
                </select>
            </div>
            <div v-for="(handle, handleIndex) in referenceLine.handles" :key="handleIndex" class="handle reference-handle" :style="getHandleStyle(handle)"
                @mousedown="startDragging($event, referenceLine, handleIndex + 1)">
            </div>
        </div>

        <canvas ref="canvas" width="800" height="600" @click="placeLine" :style="{ cursor: isAddingLine || isAddingArea || isAddingReferenceLine ? 'crosshair' : '' }"
            @mousedown="startPan" @touchstart="startTouchPan" @touchmove="handleTouchMove" @touchend="endTouchPan"></canvas>
    </div>

    <script>
        new Vue({
            el: '#app',
            data: {
                img: null,
                lines: [],
                areas: [],
                referenceLine: null,
                isAddingLine: false,
                isAddingArea: false,
                isAddingReferenceLine: false,
                areaType: 'rect',
                currentHandle: null,
                referenceLength: 0,
                unit: 'mm',
                scale: 1,
                dpi: '',
                canvasOffsetLeft: 0,
                canvasOffsetTop: 0,
                zoomLevel: 1,
                panX: 0,
                panY: 0,
                isPanning: false,
                startX: 0,
                startY: 0,
                isTouchPanning: false,
                lastPinchDistance: 0,
                lastMoveEventTime: 0,
            },
            mounted() {
                window.addEventListener('resize', this.updateCanvasOffsets);
                window.addEventListener('keydown', this.handleKeyPan);
                this.$nextTick(() => this.updateCanvasOffsets());

                this.$refs.canvas.addEventListener('wheel', this.handleZoomAndPan, { passive: false });
            },
            beforeDestroy() {
                window.removeEventListener('resize', this.updateCanvasOffsets);
                window.removeEventListener('keydown', this.handleKeyPan);
            },
            methods: {
                handleImage(event) {
                    const canvas = this.$refs.canvas;

                    const reader = new FileReader();
                    reader.onload = (e) => {
                        this.img = new Image();
                        this.img.onload = () => {
                            this.updateCanvas();
                            if (this.img.naturalWidth > canvas.width || this.img.naturalHeight > canvas.height) this.fitToWindow();
                            else this.resetZoom();
                        };
                        this.img.src = e.target.result;
                    };
                    reader.readAsDataURL(event.target.files[0]);

                },
                startDrawing(type) {
                    this.isAddingLine = type === 'measurement';
                    this.isAddingArea = type === 'area';
                    this.isAddingReferenceLine = type === 'reference';
                },
                removeAll() {
                    this.lines = [];
                    this.areas = [];
                    this.referenceLine = null;
                    this.updateScaleFromDPI();
                    this.updateCanvas();
                },
                removeReferenceLine() {
                    this.referenceLine = null;
                    this.updateScaleFromDPI();
                    this.updateCanvas();
                },
                placeLine(e) {
                    const { x, y } = this.getCanvasCoordinates(e);
                    if (this.isAddingLine) {
                        this.addMeasurementLine(x, y);
                    } else if (this.isAddingArea) {
                        if (this.areaType === 'polygon') {
                            this.addPolygonPoint(x, y);
                        } else {
                            this.addArea(x, y);
                        }
                    } else if (this.isAddingReferenceLine) {
                        this.addReferenceLine(x, y);
                    }
                },
                addMeasurementLine(x, y) {
                    if (!this.lines.length || this.lines[this.lines.length - 1].end) {
                        this.lines.push({
                            start: { x, y },
                            end: null,
                            handles: [{ x, y }],
                        });
                    } else {
                        const currentLine = this.lines[this.lines.length - 1];
                        currentLine.end = { x, y };
                        currentLine.handles.push({ x, y });
                        this.isAddingLine = false;
                        this.updateCanvas();
                    }
                },
                addArea(x, y) {
                    if (!this.areas.length || this.areas[this.areas.length - 1].end) {
                        this.areas.push({
                            type: 'rect',
                            start: { x, y },
                            end: null,
                            handles: [{ x, y }],
                        });
                    } else {
                        const currentArea = this.areas[this.areas.length - 1];
                        currentArea.end = { x, y };
                        currentArea.handles.push({ x, y });
                        this.isAddingArea = false;
                        this.updateCanvas();
                    }
                },
                addPolygonPoint(x, y) {
                    const current = this.areas.find(a => a.type === 'polygon' && !a.closed);
                    if (!current) {
                        this.areas.push({
                            type: 'polygon',
                            points: [{ x, y }],
                            closed: false,
                            handles: [{ x, y }],
                        });
                        this.updateCanvas();
                        return;
                    }
                    if (current.points.length >= 3) {
                        const first = current.points[0];
                        const dist = Math.sqrt((x - first.x) ** 2 + (y - first.y) ** 2);
                        if (dist < 20 / this.zoomLevel) {
                            current.closed = true;
                            this.isAddingArea = false;
                            this.updateCanvas();
                            return;
                        }
                    }
                    current.points.push({ x, y });
                    current.handles.push({ x, y });
                    this.updateCanvas();
                },
                finishPolygon() {
                    const current = this.areas.find(a => a.type === 'polygon' && !a.closed);
                    if (current) {
                        current.closed = true;
                        this.isAddingArea = false;
                        this.updateCanvas();
                    }
                },
                deleteArea(index) {
                    if (index !== -1) {
                        this.areas.splice(index, 1);
                        this.updateCanvas();
                    }
                },
                calculatePolygonArea(points) {
                    let area = 0;
                    const n = points.length;
                    for (let i = 0; i < n; i++) {
                        const j = (i + 1) % n;
                        area += points[i].x * points[j].y;
                        area -= points[j].x * points[i].y;
                    }
                    return Math.abs(area) / 2;
                },
                calculatePolygonCentroid(points) {
                    let cx = 0, cy = 0;
                    const n = points.length;
                    for (let i = 0; i < n; i++) {
                        const j = (i + 1) % n;
                        const f = points[i].x * points[j].y - points[j].x * points[i].y;
                        cx += (points[i].x + points[j].x) * f;
                        cy += (points[i].y + points[j].y) * f;
                    }
                    const a = this.calculatePolygonArea(points);
                    return { x: cx / (6 * a), y: cy / (6 * a) };
                },
                addReferenceLine(x, y) {
                    if (!this.referenceLine) {
                        this.referenceLine = {
                            start: { x, y },
                            end: null,
                            handles: [{ x, y }],
                        };
                    } else if (!this.referenceLine.end) {
                        this.referenceLine.end = { x, y };
                        this.referenceLine.handles.push({ x, y });
                        this.isAddingReferenceLine = false;
                        this.referenceLength = 1;
                        this.updateMeasurementLabels();
                        this.updateCanvas();
                    }
                },
                updateMeasurementLabels() {
                    if (this.referenceLine && this.referenceLine.end) {
                        const referenceLength = parseFloat(this.referenceLength) || 0;
                        if (referenceLength > 0) {
                            const referencePxLength = this.calculateLineLength(this.referenceLine);
                            this.scale = referenceLength / referencePxLength;
                        } else {
                            this.scale = 1;
                        }
                    } else {
                        this.updateScaleFromDPI();
                    }
                },
                updateScaleFromDPI() {
                    if (this.dpi > 0 && (!this.referenceLine || !this.referenceLine.end)) {
                        this.scale = 25.4 / this.dpi;
                    } else if (this.referenceLine && this.referenceLine.end) {
                        this.updateMeasurementLabels();
                    } else {
                        this.scale = 1;
                    }
                    this.updateCanvas();
                },
                getLineLength(line) {
                    if (!line.start || !line.end) return '0 px';
                    const length = this.calculateLineLength(line);
                    return this.scale !== 1 ? `${(length * this.scale).toFixed(2)} ${this.unit}` : `${length.toFixed(2)} px`;
                },
                getAreaLabel(area) {
                    if (area.type === 'polygon') {
                        if (area.points.length < 3) return '';
                        const a = this.calculatePolygonArea(area.points);
                        if (this.scale !== 1) {
                            return `${(a * this.scale * this.scale).toFixed(2)} ${this.unit}²`;
                        }
                        return `${a.toFixed(2)} px²`;
                    }
                    if (!area.start || !area.end) return '';
                    const w = Math.abs(area.end.x - area.start.x);
                    const h = Math.abs(area.end.y - area.start.y);
                    const areaPx = w * h;
                    if (this.scale !== 1) {
                        const wUnit = w * this.scale;
                        const hUnit = h * this.scale;
                        const areaUnit = areaPx * this.scale * this.scale;
                        return `${wUnit.toFixed(1)}×${hUnit.toFixed(1)} = ${areaUnit.toFixed(2)} ${this.unit}²`;
                    } else {
                        return `${w.toFixed(1)}×${h.toFixed(1)} = ${areaPx.toFixed(2)} px²`;
                    }
                },
                calculateLineLength(line) {
                    const dx = line.end.x - line.start.x;
                    const dy = line.end.y - line.start.y;
                    return Math.sqrt(dx * dx + dy * dy);
                },
                getCanvasCoordinates(e) {
                    const rect = this.$refs.canvas.getBoundingClientRect();
                    return {
                        x: (e.clientX - rect.left - this.panX) / this.zoomLevel,
                        y: (e.clientY - rect.top - this.panY) / this.zoomLevel,
                    };
                },
                updateCanvas() {
                    const canvas = this.$refs.canvas;
                    const ctx = canvas.getContext('2d');
                    canvas.width = canvas.clientWidth;
                    canvas.height = canvas.clientHeight;

                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.save();
                    ctx.scale(this.zoomLevel, this.zoomLevel);
                    ctx.translate(this.panX / this.zoomLevel, this.panY / this.zoomLevel);
                    if (this.img) {
                        ctx.drawImage(this.img, 0, 0);
                    }
                    if (this.referenceLine && this.referenceLine.end) this.drawLine(this.referenceLine, '#ff00ff', 'red');
                    this.lines.forEach(line => {
                        if (line.end) this.drawLine(line, '#00ff00', 'blue');
                    });
                    this.areas.forEach(area => {
                        if (area.end || area.type === 'polygon') this.drawArea(area);
                    });
                    ctx.restore();
                },
                drawLine(line, color, handleColor) {
                    const canvas = this.$refs.canvas;
                    const ctx = canvas.getContext('2d');
                    ctx.strokeStyle = color;
                    ctx.beginPath();
                    ctx.moveTo(line.start.x, line.start.y);
                    ctx.lineTo(line.end.x, line.end.y);
                    ctx.stroke();
                    this.drawPerpendicularEnds(ctx, line);
                    line.handles[0].x = line.start.x;
                    line.handles[0].y = line.start.y;
                    line.handles[1].x = line.end.x;
                    line.handles[1].y = line.end.y;
                },
                drawPerpendicularEnds(ctx, line) {
                    const endLength = 10;
                    const angle = Math.atan2(line.end.y - line.start.y, line.end.x - line.start.x);
                    const sinAngle = Math.sin(angle);
                    const cosAngle = Math.cos(angle);
                    const startX = line.start.x - endLength * sinAngle;
                    const startY = line.start.y + endLength * cosAngle;
                    const endX1 = line.start.x + endLength * sinAngle;
                    const endY1 = line.start.y - endLength * cosAngle;
                    const startX2 = line.end.x - endLength * sinAngle;
                    const startY2 = line.end.y + endLength * cosAngle;
                    const endX2 = line.end.x + endLength * sinAngle;
                    const endY2 = line.end.y - endLength * cosAngle;
                    ctx.beginPath();
                    ctx.moveTo(startX, startY);
                    ctx.lineTo(endX1, endY1);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(startX2, startY2);
                    ctx.lineTo(endX2, endY2);
                    ctx.stroke();
                },
                drawArea(area) {
                    if (area.type === 'polygon') {
                        this.drawPolygon(area);
                        return;
                    }
                    const ctx = this.$refs.canvas.getContext('2d');
                    const x = Math.min(area.start.x, area.end.x);
                    const y = Math.min(area.start.y, area.end.y);
                    const w = Math.abs(area.end.x - area.start.x);
                    const h = Math.abs(area.end.y - area.start.y);

                    ctx.strokeStyle = '#ffaa00';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(x, y, w, h);

                    ctx.strokeStyle = '#ffaa00';
                    ctx.lineWidth = 1;
                    ctx.setLineDash([5, 5]);
                    ctx.beginPath();
                    ctx.moveTo(area.start.x, area.start.y);
                    ctx.lineTo(area.end.x, area.end.y);
                    ctx.moveTo(area.start.x, area.end.y);
                    ctx.lineTo(area.end.x, area.start.y);
                    ctx.stroke();
                    ctx.setLineDash([]);

                    area.handles[0].x = area.start.x;
                    area.handles[0].y = area.start.y;
                    area.handles[1].x = area.end.x;
                    area.handles[1].y = area.end.y;
                },
                drawPolygon(polygon) {
                    if (polygon.points.length < 2) return;
                    const ctx = this.$refs.canvas.getContext('2d');
                    ctx.strokeStyle = '#ffaa00';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.moveTo(polygon.points[0].x, polygon.points[0].y);
                    for (let i = 1; i < polygon.points.length; i++) {
                        ctx.lineTo(polygon.points[i].x, polygon.points[i].y);
                    }
                    if (polygon.closed) {
                        ctx.closePath();
                        ctx.stroke();
                        ctx.fillStyle = 'rgba(255, 170, 0, 0.08)';
                        ctx.fill();
                    } else {
                        ctx.stroke();
                        if (polygon.points.length >= 3) {
                            ctx.setLineDash([5, 5]);
                            ctx.beginPath();
                            ctx.moveTo(polygon.points[polygon.points.length - 1].x, polygon.points[polygon.points.length - 1].y);
                            ctx.lineTo(polygon.points[0].x, polygon.points[0].y);
                            ctx.stroke();
                            ctx.setLineDash([]);
                        }
                    }
                    while (polygon.handles.length < polygon.points.length) {
                        polygon.handles.push({ x: 0, y: 0 });
                    }
                    for (let i = 0; i < polygon.points.length; i++) {
                        polygon.handles[i].x = polygon.points[i].x;
                        polygon.handles[i].y = polygon.points[i].y;
                    }
                },
                deleteLine(index) {
                    if (index !== -1) {
                        this.lines.splice(index, 1);
                        this.updateCanvas();
                    }
                },
                startDragging(event, line, handleIndex) {
                    this.currentHandle = { line, handleIndex };
                    document.addEventListener('mousemove', this.dragHandle);
                    document.addEventListener('mouseup', this.endDraggingHandle);
                },
                dragHandle(event) {
                    if (!this.currentHandle) return;
                    const { x, y } = this.getCanvasCoordinates(event);
                    const obj = this.currentHandle.line;
                    const idx = this.currentHandle.handleIndex - 1;
                    const handle = obj.handles[idx];
                    handle.x = x;
                    handle.y = y;
                    if (obj.type === 'polygon') {
                        obj.points[idx] = { x, y };
                    } else if (idx === 0) {
                        obj.start = { x, y };
                    } else {
                        obj.end = { x, y };
                    }
                    this.updateMeasurementLabels();
                    this.updateCanvas();
                },
                endDraggingHandle() {
                    this.currentHandle = null;
                    document.removeEventListener('mousemove', this.dragHandle);
                    document.removeEventListener('mouseup', this.endDraggingHandle);
                },
                updateCanvasOffsets() {
                    const canvas = this.$refs.canvas;
                    const rect = canvas.getBoundingClientRect();
                    this.canvasOffsetLeft = rect.left;
                    this.canvasOffsetTop = rect.top;
                    canvas.width = canvas.clientWidth;
                    canvas.height = canvas.clientHeight;
                    this.updateCanvas();
                },
                startPan(event) {
                    this.isPanning = true;
                    this.startX = event.clientX - this.panX;
                    this.startY = event.clientY - this.panY;
                    document.addEventListener('mousemove', this.pan);
                    document.addEventListener('mouseup', this.endPan);
                },
                pan(event) {
                    if (!this.isPanning) return;
                    this.panX = event.clientX - this.startX;
                    this.panY = event.clientY - this.startY;
                    this.updateCanvas();
                },
                endPan() {
                    this.isPanning = false;
                    document.removeEventListener('mousemove', this.pan);
                    document.removeEventListener('mouseup', this.endPan);
                },
                handleZoomAndPan(event) {
                    event.preventDefault();

                    // Check if the event should zoom or pan
                    if (event.ctrlKey) {
                        // Handle zoom
                        const rect = this.$refs.canvas.getBoundingClientRect();
                        const mouseX = (event.clientX - rect.left) / this.zoomLevel - this.panX / this.zoomLevel;
                        const mouseY = (event.clientY - rect.top) / this.zoomLevel - this.panY / this.zoomLevel;

                        const zoomFactor = event.deltaY > 0 ? 0.95 : 1.05;
                        let newZoomLevel = this.zoomLevel * zoomFactor;

                        // Limit zoom level between 0.001 (0.1%) and 100 (10000%)
                        newZoomLevel = Math.max(0.001, Math.min(100, newZoomLevel));

                        this.panX -= (mouseX * (newZoomLevel - this.zoomLevel));
                        this.panY -= (mouseY * (newZoomLevel - this.zoomLevel));

                        this.zoomLevel = newZoomLevel;
                    } else {
                        // Handle pan
                        this.panX -= event.deltaX;
                        this.panY -= event.deltaY;
                    }

                    this.updateCanvas();
                },
                zoomIn() {
                    const canvas = this.$refs.canvas;
                    const centerX = canvas.width / 2 / this.zoomLevel - this.panX / this.zoomLevel;
                    const centerY = canvas.height / 2 / this.zoomLevel - this.panY / this.zoomLevel;

                    const zoomFactor = 1.1;
                    let newZoomLevel = this.zoomLevel * zoomFactor;

                    // Limit zoom level
                    newZoomLevel = Math.max(0.001, Math.min(100, newZoomLevel));

                    this.panX -= (centerX * (newZoomLevel - this.zoomLevel));
                    this.panY -= (centerY * (newZoomLevel - this.zoomLevel));

                    this.zoomLevel = newZoomLevel;
                    this.updateCanvas();
                },
                zoomOut() {
                    const canvas = this.$refs.canvas;
                    const centerX = canvas.width / 2 / this.zoomLevel - this.panX / this.zoomLevel;
                    const centerY = canvas.height / 2 / this.zoomLevel - this.panY / this.zoomLevel;

                    const zoomFactor = 0.9;
                    let newZoomLevel = this.zoomLevel * zoomFactor;

                    // Limit zoom level
                    newZoomLevel = Math.max(0.001, Math.min(100, newZoomLevel));

                    this.panX -= (centerX * (newZoomLevel - this.zoomLevel));
                    this.panY -= (centerY * (newZoomLevel - this.zoomLevel));

                    this.zoomLevel = newZoomLevel;
                    this.updateCanvas();
                },
                resetZoom() {
                    this.zoomLevel = 1;
                    this.panX = 0;
                    this.panY = 0;
                    this.updateCanvas();
                },
                fitToWindow() {
                    if (!this.img) return;

                    const canvas = this.$refs.canvas;
                    const scaleX = canvas.width / this.img.width;
                    const scaleY = canvas.height / this.img.height;
                    this.zoomLevel = Math.min(scaleX, scaleY);
                    this.panX = (canvas.width - this.img.width * this.zoomLevel) / 2;
                    this.panY = (canvas.height - this.img.height * this.zoomLevel) / 2;

                    this.updateCanvas();
                },
                handleKeyPan(event) {
                    const panStep = 20;
                    if (event.key === 'ArrowUp') this.panY += panStep;
                    if (event.key === 'ArrowDown') this.panY -= panStep;
                    if (event.key === 'ArrowLeft') this.panX += panStep;
                    if (event.key === 'ArrowRight') this.panX -= panStep;
                    this.updateCanvas();
                },
                startTouchPan(event) {
                    if (event.touches.length === 1) {
                        this.isTouchPanning = true;
                        this.startX = event.touches[0].clientX - this.panX;
                        this.startY = event.touches[0].clientY - this.panY;
                    } else if (event.touches.length === 2) {
                        this.isTouchPanning = false;
                        this.lastPinchDistance = this.getPinchDistance(event.touches);
                    }
                },
                handleTouchMove(event) {
                    if (this.isTouchPanning && event.touches.length === 1) {
                        this.panX = event.touches[0].clientX - this.startX;
                        this.panY = event.touches[0].clientY - this.startY;
                        this.updateCanvas();
                    } else if (event.touches.length === 2) {
                        const newDistance = this.getPinchDistance(event.touches);
                        const zoomFactor = newDistance / this.lastPinchDistance;
                        let newZoomLevel = this.zoomLevel * (zoomFactor > 1 ? 1.01 : 0.99); // Adjust sensitivity for pinch

                        // Limit zoom level
                        newZoomLevel = Math.max(0.001, Math.min(100, newZoomLevel));

                        this.zoomLevel = newZoomLevel;
                        this.lastPinchDistance = newDistance;
                        this.updateCanvas();
                    }
                },
                endTouchPan() {
                    this.isTouchPanning = false;
                },
                getPinchDistance(touches) {
                    const dx = touches[0].clientX - touches[1].clientX;
                    const dy = touches[0].clientY - touches[1].clientY;
                    return Math.sqrt(dx * dx + dy * dy);
                },
                getLineStyle(line) {
                    return {
                        left: `${(line.start.x + line.end.x) / 2 * this.zoomLevel + this.panX + this.canvasOffsetLeft}px`,
                        top: `${(line.start.y + line.end.y) / 2 * this.zoomLevel + this.panY + this.canvasOffsetTop}px`,
                    };
                },
                getAreaCenterStyle(area) {
                    if (area.type === 'polygon') {
                        if (area.points.length < 3) return { display: 'none' };
                        const c = this.calculatePolygonCentroid(area.points);
                        return {
                            left: `${c.x * this.zoomLevel + this.panX + this.canvasOffsetLeft}px`,
                            top: `${c.y * this.zoomLevel + this.panY + this.canvasOffsetTop}px`,
                        };
                    }
                    return {
                        left: `${(area.start.x + area.end.x) / 2 * this.zoomLevel + this.panX + this.canvasOffsetLeft}px`,
                        top: `${(area.start.y + area.end.y) / 2 * this.zoomLevel + this.panY + this.canvasOffsetTop}px`,
                    };
                },
                getHandleStyle(handle) {
                    return {
                        left: `${handle.x * this.zoomLevel + this.panX + this.canvasOffsetLeft}px`,
                        top: `${handle.y * this.zoomLevel + this.panY + this.canvasOffsetTop}px`,
                    };
                },
            }
        });
    </script>
</body>

</html>
